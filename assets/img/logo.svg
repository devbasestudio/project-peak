<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <defs>
        <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f3f4f6" />
            <stop offset="30%" stop-color="#d1d5db" />
            <stop offset="50%" stop-color="#9ca3af" />
            <stop offset="70%" stop-color="#d1d5db" />
            <stop offset="100%" stop-color="#6b7280" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.3" />
        </filter>
    </defs>
    <!-- Background for visibility in light/dark themes, but here we just make the logo transparent background -->
    <g filter="url(#shadow)">
        <!-- Top 'P' -->
        <path d="M 50,20 L 120,20 C 150,20 170,40 170,70 C 170,100 150,120 120,120 L 90,120 L 90,90 L 120,90 C 135,90 140,80 140,70 C 140,60 135,50 120,50 L 90,50 L 90,120 L 50,120 Z" fill="url(#metal)" />
        <!-- Bottom 'P' inverted or stylized 'P' -->
        <path d="M 150,180 L 80,180 C 50,180 30,160 30,130 C 30,100 50,80 80,80 L 110,80 L 110,110 L 80,110 C 65,110 60,120 60,130 C 60,140 65,150 80,150 L 110,150 L 110,80 L 150,80 Z" fill="url(#metal)" />
    </g>
</svg>
